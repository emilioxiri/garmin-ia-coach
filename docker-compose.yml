version: "3.9"

services:
  garmin-coach:
    build: .
    container_name: garmin-coach
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data          # Base de datos TinyDB + logs
    environment:
      - TZ=Europe/Madrid
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
